<div class="p-6 space-y-8 bg-gray-100 min-h-screen">

  <!-- Filter Header -->
  <div class="flex items-center justify-between">
    <h2 class="text-xl font-semibold text-gray-800">Dashboard Overview</h2>
    <div class="flex items-center gap-2">
      <label class="font-medium text-gray-700">Select Range:</label>
      <select (change)="onRangeChange($event)"
              class="border border-gray-300 p-2 rounded-md shadow-sm text-gray-800 focus:ring-2 focus:ring-blue-500 focus:outline-none">
        <option value="7d">Last 7 Days</option>
        <option value="6m">Last 6 Months</option>
        <option value="1y">Last 1 Year</option>
        <option value="all" selected>All Time</option>
      </select>
    </div>
  </div>

  <!-- Stat Cards -->
  <div class="flex grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    <div class="bg-gradient-to-br from-slate-800 to-gray-900 p-6 rounded-2xl shadow-xl text-center">
      <div class="text-3xl font-bold text-yellow-400">${{ totals.total_posts }}</div>
      <div class="mt-1 text-sm text-gray-300 tracking-wide">Total Posts</div>
    </div>

    <div class="bg-gradient-to-br from-slate-800 to-gray-900 p-6 rounded-2xl shadow-xl text-center">
      <div class="text-3xl font-bold text-yellow-400">${{ totals.total_users }}</div>
      <div class="mt-1 text-sm text-gray-300 tracking-wide">Total Users</div>
    </div>

    <div class="bg-gradient-to-br from-slate-800 to-gray-900 p-6 rounded-2xl shadow-xl text-center">
      <div class="text-3xl font-bold text-yellow-400">${{ totals.total_comments }}</div>
      <div class="mt-1 text-sm text-gray-300 tracking-wide">Total Comments</div>
    </div>

    <div class="bg-gradient-to-br from-slate-800 to-gray-900 p-6 rounded-2xl shadow-xl text-center">
      <div class="text-3xl font-bold text-yellow-400">${{ totals.total_likes }}</div>
      <div class="mt-1 text-sm text-gray-300 tracking-wide">Total Likes</div>
    </div>
  </div>

  <!-- Chart Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
    <div id="postsChart" class="bg-white p-4 rounded-xl shadow" style="height: 300px;"></div>
    <div id="usersChart" class="bg-white p-4 rounded-xl shadow" style="height: 300px;"></div>
    <div id="likesChart" class="bg-white p-4 rounded-xl shadow" style="height: 300px;"></div>
    <div id="tagsChart" class="bg-white p-4 rounded-xl shadow" style="height: 300px;"></div>
    <div id="categoryChart" class="bg-white p-4 rounded-xl shadow" style="height: 300px;"></div>
  </div>
</div>
